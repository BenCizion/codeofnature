<style>
:root {
  --bg:#080c14; --sf:#0e1520; --sf2:#131d2d;
  --bd:rgba(0,210,255,.1); --bd2:rgba(255,255,255,.06);
  --cy:#00d2ff; --cy-d:rgba(0,210,255,.1); --bl:#1a6fff;
  --tx:#e8f0fe; --td:#7a8ba8; --tm:#3d5068;
  --go:#f5c842; --gr:#00f5a0; --re:#ff4d6d; --or:#ff9640; --pu:#a855f7;
  --sb:232px; --rp:260px; --tb:52px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans KR',sans-serif;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,210,255,.02)1px,transparent 1px),linear-gradient(90deg,rgba(0,210,255,.02)1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}

/* ── TOPBAR ── */
.topbar{position:fixed;top:0;left:0;right:0;z-index:300;height:var(--tb);background:rgba(8,12,20,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;padding:0 14px;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:#fff;white-space:nowrap;flex-shrink:0;text-decoration:none;}
.logo span{color:var(--cy);}
.url-pill{flex:1;min-width:0;background:var(--sf2);border:1px solid var(--bd);border-radius:5px;padding:5px 11px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--td);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top-acts{display:flex;gap:7px;flex-shrink:0;}
.btn{padding:6px 11px;border-radius:4px;font-size:11px;cursor:pointer;border:1px solid var(--bd2);background:var(--sf2);color:var(--td);transition:all .2s;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;}
.btn:hover{border-color:var(--cy);color:var(--cy);}
.btn-p{background:linear-gradient(135deg,var(--cy),var(--bl));color:#000!important;font-weight:700;border:none;}
.btn-p:hover{opacity:.9;}
.mob-tog{display:none;background:none;border:none;color:var(--cy);font-size:20px;cursor:pointer;padding:2px 4px;flex-shrink:0;line-height:1;}

/* ── SHELL ── */
.shell{position:fixed;top:var(--tb);left:0;right:0;bottom:0;display:flex;z-index:1;}

/* ── SIDEBAR ── */
.sidebar{width:var(--sb);flex-shrink:0;border-right:1px solid var(--bd);overflow-y:auto;background:var(--sf);padding:14px 11px;display:flex;flex-direction:column;gap:16px;transition:transform .25s ease;}
.sec-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--tm);margin-bottom:8px;}
.tchain{display:flex;flex-direction:column;gap:1px;}
.tnode{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:6px;cursor:pointer;border:1px solid transparent;transition:all .18s;}
.tnode:hover{background:var(--cy-d);}
.tnode.active{background:var(--cy-d);border-color:rgba(0,210,255,.3);}
.ndot{width:7px;height:7px;border-radius:50%;flex-shrink:0;border:1px solid var(--tm);transition:all .2s;}
.tnode.active .ndot{background:var(--cy);border-color:var(--cy);box-shadow:0 0 8px var(--cy);}
.ntx{font-size:12px;color:var(--tx);flex:1;font-weight:500;}
.ncnt{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--tm);background:rgba(255,255,255,.04);padding:2px 5px;border-radius:3px;}
.tconn{width:1px;height:8px;background:linear-gradient(to bottom,var(--cy),transparent);margin:0 auto 0 13px;opacity:.22;}
.pcard{background:var(--sf2);border:1px solid var(--bd);border-radius:7px;padding:11px 12px;margin-bottom:8px;}
.pname{font-size:12px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.ptag{font-size:9px;padding:2px 6px;border-radius:20px;font-family:'JetBrains Mono',monospace;}
.pt-me{background:rgba(0,210,255,.15);color:var(--cy);}
.pt-g{background:rgba(245,200,66,.15);color:var(--go);}
.pdesc{font-size:11px;color:var(--td);line-height:1.6;margin-bottom:5px;}
.patts{display:flex;flex-wrap:wrap;gap:4px;}
.att{font-size:9px;padding:2px 6px;border-radius:3px;background:rgba(255,255,255,.04);color:var(--td);border:1px solid var(--bd2);}

/* ── CENTER ── */
.center{flex:1;min-width:0;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;}

/* topic header */
.thead{background:var(--sf);border:1px solid var(--bd);border-radius:9px;padding:14px 18px;}
.ttitle{font-family:'Syne',sans-serif;font-size:clamp(13px,1.6vw,18px);font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;line-height:1.4;}
.ttag{font-size:10px;padding:2px 7px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-weight:400;white-space:nowrap;}
.tt-bl{background:var(--cy-d);color:var(--cy);border:1px solid rgba(0,210,255,.2);}
.tt-re{background:rgba(255,77,109,.08);color:var(--re);border:1px solid rgba(255,77,109,.25);}
.tt-go{background:rgba(245,200,66,.08);color:var(--go);border:1px solid rgba(245,200,66,.25);}
.tt-gr{background:rgba(0,245,160,.08);color:var(--gr);border:1px solid rgba(0,245,160,.25);}
.tt-pu{background:rgba(168,85,247,.08);color:var(--pu);border:1px solid rgba(168,85,247,.25);}
.tmeta{font-size:10px;color:var(--td);display:flex;gap:14px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;}

/* stat cards */
.crow{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:13px 14px;position:relative;overflow:hidden;}
.card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;}
.c-pos::after{background:linear-gradient(90deg,var(--gr),transparent);}
.c-neg::after{background:linear-gradient(90deg,var(--re),transparent);}
.c-neu::after{background:linear-gradient(90deg,var(--go),transparent);}
.clbl{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--tm);margin-bottom:7px;}
.cval{font-family:'Syne',sans-serif;font-size:clamp(20px,2.8vw,34px);font-weight:800;line-height:1;margin-bottom:3px;}
.c-pos .cval{color:var(--gr);}
.c-neg .cval{color:var(--re);}
.c-neu .cval{color:var(--go);}
.csub{font-size:10px;color:var(--tm);}

/* charts row — KEY responsive fix */
.chrow{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.chcard{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:13px 14px;min-width:0;overflow:hidden;}
.chtitle{font-size:12px;font-weight:600;margin-bottom:2px;}
.chdesc{font-size:10px;color:var(--tm);margin-bottom:10px;font-family:'JetBrains Mono',monospace;}
/* Chart.js canvas responsive wrapper */
.ch-wrap{position:relative;width:100%;min-height:0;}

/* cloud */
.ccloud{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:13px 14px;}
.ctags{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;}
.ctg{padding:4px 11px;border-radius:20px;border:1px solid;cursor:pointer;transition:all .18s;}
.ctg:hover{opacity:.75;transform:scale(1.04);}
.s1{font-size:15px;border-color:rgba(0,210,255,.4);color:var(--cy);background:rgba(0,210,255,.08);}
.s2{font-size:13px;border-color:rgba(245,200,66,.35);color:var(--go);background:rgba(245,200,66,.06);}
.s3{font-size:11px;border-color:rgba(255,255,255,.12);color:var(--td);}
.s4{font-size:10px;border-color:rgba(255,255,255,.07);color:var(--tm);}

/* timeline */
.tlcard{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:13px 14px;}
.tlwrap{position:relative;padding-left:17px;margin-top:11px;}
.tlwrap::before{content:'';position:absolute;left:5px;top:6px;bottom:6px;width:1px;background:linear-gradient(to bottom,var(--cy),transparent);opacity:.3;}
.tli{position:relative;padding:0 0 14px 13px;}
.tli::before{content:'';position:absolute;left:-12px;top:5px;width:7px;height:7px;border-radius:50%;border:1px solid var(--cy);background:var(--bg);}
.tldate{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--cy);margin-bottom:3px;}
.tltext{font-size:11px;color:var(--td);line-height:1.7;}
.tlbadge{display:inline-block;font-size:8px;padding:2px 5px;border-radius:2px;margin-top:3px;font-family:'JetBrains Mono',monospace;}
.b-f{background:rgba(0,210,255,.15);color:var(--cy);}
.b-p{background:rgba(255,255,255,.05);color:var(--tm);}
.b-n{background:rgba(0,245,160,.12);color:var(--gr);}

/* ── RIGHT PANEL ── */
.rpanel{width:var(--rp);flex-shrink:0;border-left:1px solid var(--bd);overflow-y:auto;background:var(--sf);padding:14px 11px;display:flex;flex-direction:column;gap:16px;}
.abtn{width:100%;padding:9px 11px;border-radius:6px;border:1px solid var(--bd2);background:var(--sf2);color:var(--tx);font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .18s;text-align:left;margin-bottom:6px;}
.abtn:hover{border-color:var(--cy);background:var(--cy-d);}
.aico{font-size:14px;width:25px;height:25px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);border-radius:5px;flex-shrink:0;}
.atitle{font-weight:500;font-size:12px;}
.asub{font-size:10px;color:var(--tm);margin-top:1px;}
.citem{background:var(--sf2);border:1px solid var(--bd2);border-radius:7px;padding:9px 11px;margin-bottom:6px;}
.chead{display:flex;justify-content:space-between;margin-bottom:4px;}
.cauth{font-size:10px;color:var(--cy);font-weight:600;font-family:'JetBrains Mono',monospace;}
.clikes{font-size:10px;color:var(--tm);font-family:'JetBrains Mono',monospace;}
.cbody{font-size:11px;color:var(--td);line-height:1.6;}
.csent{display:inline-block;font-size:9px;padding:2px 5px;border-radius:2px;margin-top:4px;font-family:'JetBrains Mono',monospace;}
.sn{background:rgba(255,77,109,.12);color:var(--re);}
.sp{background:rgba(0,245,160,.12);color:var(--gr);}
.su{background:rgba(255,150,64,.1);color:var(--or);}
.sharebox{background:var(--sf2);border:1px solid var(--bd);border-radius:7px;padding:11px;}
.shareurl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--cy);word-break:break-all;margin:7px 0;padding:5px 7px;background:rgba(0,210,255,.05);border-radius:3px;border:1px solid rgba(0,210,255,.1);}
.copybtn{width:100%;padding:7px;background:rgba(0,210,255,.08);border:1px solid rgba(0,210,255,.2);border-radius:4px;color:var(--cy);font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;}
.copybtn:hover{background:rgba(0,210,255,.2);}

/* ── RESPONSIVE ── */
@media(max-width:1120px){:root{--rp:220px;--sb:200px;}}
@media(max-width:900px){.rpanel{display:none;}:root{--sb:190px;}}
@media(max-width:700px){
  .sidebar{position:absolute;top:0;bottom:0;left:0;z-index:100;transform:translateX(-100%);box-shadow:4px 0 20px rgba(0,0,0,.5);}
  .sidebar.open{transform:translateX(0);}
  .mob-tog{display:block;}
  .url-pill{display:none;}
  .crow{grid-template-columns:1fr 1fr;}
  .chrow{grid-template-columns:1fr;}
}
@media(max-width:440px){.crow{grid-template-columns:1fr;}}

/* scrollbar */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}

/* fade in */
@keyframes fi{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fi{animation:fi .3s ease forwards;}
</style>
</head>

/* ══════════════════════════
   STATE
══════════════════════════ */
let active = DATA[0].id;
let lineChart = null, donutChart = null;

/* ══════════════════════════
   RENDER CHAIN
══════════════════════════ */
function renderChain() {
  const el = document.getElementById('chain');
  el.innerHTML = '';
  DATA.forEach((d, i) => {
    const n = document.createElement('div');
    n.className = 'tnode' + (d.id === active ? ' active' : '');
    n.innerHTML = `<div class="ndot"></div><span class="ntx">${d.label}</span><span class="ncnt">${d.count}</span>`;
    n.onclick = () => select(d.id);
    el.appendChild(n);
    if (i < DATA.length - 1) {
      const c = document.createElement('div');
      c.className = 'tconn';
      el.appendChild(c);
    }
  });
}

/* ══════════════════════════
   SELECT
══════════════════════════ */
function select(id) {
  active = id;
  renderChain();
  renderCenter();
  renderRight();
  // close mobile sidebar on select
  if (window.innerWidth <= 700) {
    document.getElementById('sb').classList.remove('open');
  }
}

/* ══════════════════════════
   RENDER RIGHT PANEL
══════════════════════════ */
function renderRight() {
  const d = DATA.find(x => x.id === active);
  // group persona
  document.getElementById('grpCard').innerHTML = `
    <div class="pname">관련 집단 <span class="ptag pt-g">GROUP</span></div>
    <div class="pdesc">${d.grp.n} · ${d.grp.d}</div>
    <div class="patts">${d.grp.a.map(a=>`<span class="att">${a}</span>`).join('')}</div>`;
  // comments
  document.getElementById('cmtList').innerHTML = d.cmts.map(c => `
    <div class="citem fi">
      <div class="chead"><span class="cauth">${c.a}</span><span class="clikes">👍 ${c.l}</span></div>
      <div class="cbody">${c.b}</div>
      <span class="csent ${c.s}">${c.sl}</span>
    </div>`).join('');
  document.getElementById('assetSub').textContent = d.asset;
  document.getElementById('shareUrl').textContent = d.share;
}

/* ══════════════════════════
   RENDER CENTER
══════════════════════════ */
function renderCenter() {
  const d = DATA.find(x => x.id === active);

  // destroy charts FIRST
  if (lineChart) { lineChart.destroy(); lineChart = null; }
  if (donutChart) { donutChart.destroy(); donutChart = null; }

  const posArrow = d.posD.startsWith('+') ? `▲ ${d.posD.slice(1)}` : `▼ ${d.posD.slice(1)}`;
  const negArrow = d.negD.startsWith('+') ? `▲ ${d.negD.slice(1)}` : `▼ ${d.negD.slice(1)}`;

  document.getElementById('center').innerHTML = `
    <div class="thead fi">
      <div class="ttitle">${d.title} ${d.tags.map(t=>`<span class="ttag ${t.c}">${t.t}</span>`).join('')}</div>
      <div class="tmeta"><span>📊 ${d.meta}</span></div>
    </div>

    <div class="crow fi">
      <div class="card c-pos"><div class="clbl">긍정 여론</div><div class="cval">${d.pos}%</div><div class="csub">전일 대비 ${posArrow}</div></div>
      <div class="card c-neg"><div class="clbl">부정 여론</div><div class="cval">${d.neg}%</div><div class="csub">전일 대비 ${negArrow}</div></div>
      <div class="card c-neu"><div class="clbl">중립 / 정보탐색</div><div class="cval">${d.neu}%</div><div class="csub">유보 댓글 포함</div></div>
    </div>

    <div class="chrow fi">
      <div class="chcard">
        <div class="chtitle">📈 여론 시계열 (72시간)</div>
        <div class="chdesc">시간별 감성 변화 추이</div>
        <div class="ch-wrap"><canvas id="lineC"></canvas></div>
      </div>
      <div class="chcard">
        <div class="chtitle">🎯 감성 분포</div>
        <div class="chdesc">전체 댓글 감성 비율</div>
        <div class="ch-wrap"><canvas id="donutC"></canvas></div>
      </div>
    </div>

    <div class="ccloud fi">
      <div class="chtitle">🌐 연관 토픽 클라우드</div>
      <div class="chdesc">현재 동시 언급 키워드</div>
      <div class="ctags">${d.cloud.map(c=>`<span class="ctg ${c.s}">${c.t}</span>`).join('')}</div>
    </div>

    <div class="tlcard fi">
      <div class="chtitle">🕰️ 통시적 분석</div>
      <div class="chdesc">이 토픽의 과거 · 현재 · 미래 맥락</div>
      <div class="tlwrap">
        ${d.tl.map(t=>`
          <div class="tli">
            <div class="tldate">${t.d}</div>
            <div class="tltext">${t.x}</div>
            <span class="tlbadge ${t.b}">${t.l}</span>
          </div>`).join('')}
      </div>
    </div>`;

  // init charts after DOM paint
  requestAnimationFrame(() => initCharts(d));
}

/* ══════════════════════════
   INIT CHARTS — responsive
══════════════════════════ */
function initCharts(d) {
  const lc = document.getElementById('lineC');
  const dc = document.getElementById('donutC');
  if (!lc || !dc) return;

  const gridColor = 'rgba(255,255,255,.04)';
  const tickColor = '#3d5068';
  const fontMono = { family:'JetBrains Mono' };

  lineChart = new Chart(lc, {
    type:'line',
    data:{
      labels: d.line.lb,
      datasets:[
        { label:'긍정', data:d.line.p, borderColor:'#00f5a0', backgroundColor:'rgba(0,245,160,.06)', tension:.4, fill:true, pointRadius:2, borderWidth:2 },
        { label:'부정', data:d.line.n, borderColor:'#ff4d6d', backgroundColor:'rgba(255,77,109,.06)', tension:.4, fill:true, pointRadius:2, borderWidth:2 },
        { label:'중립', data:d.line.u, borderColor:'#f5c842', backgroundColor:'rgba(245,200,66,.03)', tension:.4, fill:true, pointRadius:2, borderWidth:2 },
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:true,
      animation:{ duration:450, easing:'easeInOutQuart' },
      plugins:{ legend:{ labels:{ color:'#7a8ba8', font:{ size:9, ...fontMono }, boxWidth:8, padding:10 } } },
      scales:{
        x:{ grid:{ color:gridColor }, ticks:{ color:tickColor, font:{ size:8 } } },
        y:{ grid:{ color:gridColor }, ticks:{ color:tickColor, font:{ size:8 } }, min:0, max:80 }
      }
    }
  });

  donutChart = new Chart(dc, {
    type:'doughnut',
    data:{
      labels:[`부정 ${d.neg}%`,`긍정 ${d.pos}%`,`중립 ${d.neu}%`],
      datasets:[{
        data:[d.neg, d.pos, d.neu],
        backgroundColor:['rgba(255,77,109,.8)','rgba(0,245,160,.8)','rgba(245,200,66,.8)'],
        borderColor:['#ff4d6d','#00f5a0','#f5c842'],
        borderWidth:1, hoverOffset:5
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:true,
      animation:{ duration:450 },
      cutout:'66%',
      plugins:{ legend:{ position:'bottom', labels:{ color:'#7a8ba8', font:{ size:9, ...fontMono }, boxWidth:8, padding:10 } } }
    }
  });
}

/* ══════════════════════════
   MOBILE SIDEBAR
══════════════════════════ */
function toggleSb() {
  document.getElementById('sb').classList.toggle('open');

/* ══════════════════════════
