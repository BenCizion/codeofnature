<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveRe Agent Hub — 에이전틱 관제센터</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:     #F0F2F7;
  --s1:     #FFFFFF;
  --s2:     #F7F8FA;
  --s3:     #EEF0F5;
  --s4:     #E2E6EE;
  --border: rgba(0,0,0,.08);
  --b2:     rgba(0,0,0,.13);

  --brand:  #E8251A;
  --cyan:   #0077CC;
  --green:  #16A34A;
  --amber:  #D97706;
  --violet: #6D28D9;
  --red:    #DC2626;

  --t1: #0F172A;
  --t2: #475569;
  --t3: #94A3B8;

  --sans: 'Pretendard', -apple-system, sans-serif;
  --mono: 'Pretendard', -apple-system, sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--sans);background:var(--bg);color:var(--t1);
  font-size:13px;display:flex;flex-direction:column;
}

/* ── TOPBAR ── */
.topbar{
  height:48px;flex-shrink:0;
  background:rgba(255,255,255,.97);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 18px;gap:12px;
  box-shadow:0 1px 4px rgba(0,0,0,.07),0 2px 16px rgba(232,37,26,.06);
}
.logo-mark{
  width:32px;height:28px;border-radius:6px;
  background:var(--brand);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;color:#fff;letter-spacing:-.02em;flex-shrink:0;
}
.logo-text{font-size:14px;font-weight:800;color:var(--t1);letter-spacing:.02em}
.logo-text em{color:var(--brand);font-style:normal}
.topbar-sub{font-size:11px;color:var(--t3);padding-left:10px;border-left:1px solid var(--border);margin-left:2px}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}

.sys-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--green);font-weight:700}
.sys-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 5px var(--green)}50%{opacity:.5;box-shadow:none}}

.agent-summary{display:flex;gap:6px}
.ag-pill{
  font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;
  display:flex;align-items:center;gap:4px;
}
.ag-pill.running{background:rgba(22,163,74,.1);color:var(--green);border:1px solid rgba(22,163,74,.25)}
.ag-pill.idle{background:var(--s3);color:var(--t3);border:1px solid var(--border)}
.ag-pill.busy{background:rgba(217,119,6,.1);color:var(--amber);border:1px solid rgba(217,119,6,.2);animation:pulseAmber 1.5s infinite}
@keyframes pulseAmber{0%,100%{opacity:1}50%{opacity:.65}}

.topbar-btn{
  background:var(--s2);border:1.5px solid var(--border);
  color:var(--t2);font-size:11px;font-weight:700;
  padding:5px 12px;border-radius:6px;cursor:pointer;transition:all .15s;
  font-family:var(--sans);
}
.topbar-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.topbar-btn.danger{border-color:rgba(232,37,26,.3);color:var(--brand)}

/* ── MAIN LAYOUT ── */
.main{
  flex:1;overflow:hidden;
  display:grid;
  grid-template-columns:220px 1fr 280px;
  grid-template-rows:1fr;
  gap:0;
}

/* ── LEFT: AGENT PANEL ── */
.agent-panel{
  background:var(--s1);
  border-right:1.5px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.panel-header{
  padding:14px 14px 10px;
  border-bottom:1px solid var(--border);
  font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);
}
.agent-list{flex:1;overflow-y:auto;padding:8px 0}
.agent-list::-webkit-scrollbar{width:3px}
.agent-list::-webkit-scrollbar-thumb{background:var(--s4)}

.agent-item{
  padding:12px 14px;cursor:pointer;
  border-left:3px solid transparent;
  transition:all .15s;
  position:relative;
}
.agent-item:hover{background:var(--s2)}
.agent-item.active{background:rgba(0,119,204,.06);border-left-color:var(--cyan)}
.agent-item.active .ai-name{color:var(--cyan);font-weight:800}

.ai-top{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.ai-avatar{
  width:32px;height:32px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:15px;
}
.ai-info{flex:1;min-width:0}
.ai-name{font-size:12px;font-weight:700;color:var(--t1);margin-bottom:1px}
.ai-role{font-size:10px;color:var(--t3)}
.ai-status{
  font-size:9px;font-weight:800;padding:2px 7px;border-radius:3px;
  letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;
}
.st-running{background:rgba(22,163,74,.1);color:var(--green)}
.st-idle{background:var(--s3);color:var(--t3)}
.st-busy{background:rgba(217,119,6,.1);color:var(--amber)}
.st-done{background:rgba(0,119,204,.1);color:var(--cyan)}

.ai-progress{height:2px;background:var(--s3);border-radius:1px;overflow:hidden}
.ai-bar{height:100%;border-radius:1px;transition:width .8s ease}

.ai-log{font-size:10px;color:var(--t3);margin-top:5px;line-height:1.5;font-family:var(--mono)}

.agent-sep{height:1px;background:var(--border);margin:6px 14px}

/* collaboration arrows */
.collab-panel{padding:12px 14px;border-top:1px solid var(--border)}
.collab-title{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.collab-flow{display:flex;flex-direction:column;gap:4px}
.cf-row{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--t2)}
.cf-from,.cf-to{font-weight:700;font-size:10px;padding:2px 6px;border-radius:3px;background:var(--s3)}
.cf-arrow{color:var(--cyan);font-size:10px}
.cf-label{color:var(--t3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── CENTER: WORKSPACE ── */
.workspace{
  display:flex;flex-direction:column;overflow:hidden;
  background:var(--bg);
}
.ws-tabs{
  display:flex;align-items:center;gap:0;
  background:var(--s1);border-bottom:1.5px solid var(--border);
  padding:0 16px;flex-shrink:0;
}
.ws-tab{
  font-size:12px;font-weight:600;color:var(--t3);
  padding:12px 16px;cursor:pointer;border-bottom:2px solid transparent;
  transition:all .15s;white-space:nowrap;
}
.ws-tab:hover{color:var(--t2)}
.ws-tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.ws-content{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* workspace panels */
.ws-panel{display:none;flex:1;overflow:hidden;flex-direction:column}
.ws-panel.active{display:flex}

/* RAW DATA PANEL */
.raw-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:12px;padding:14px;flex:1;overflow-y:auto;
}
.raw-card{
  background:var(--s1);border:1px solid var(--border);border-radius:10px;
  overflow:hidden;
}
.rc-head{
  padding:10px 13px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.rc-title{font-size:11px;font-weight:700;color:var(--t1)}
.rc-badge{font-size:9px;font-weight:800;padding:2px 6px;border-radius:3px;background:rgba(0,212,255,.1);color:var(--cyan)}
.rc-body{padding:10px 13px;font-family:var(--mono);font-size:11px;line-height:1.8}
.rc-row{display:flex;gap:8px;padding:3px 0;border-bottom:1px solid rgba(0,0,0,.04)}
.rc-row:last-child{border-bottom:none}
.rc-ch{color:var(--t3);width:60px;flex-shrink:0;font-size:10px}
.rc-val{color:var(--t1);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rc-score{font-weight:700;flex-shrink:0}
.score-pos{color:var(--green)}
.score-neg{color:var(--red)}

/* STATS PANEL */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:14px;flex:1;overflow-y:auto}
.stat-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:14px}
.sc-label{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.sc-val{font-size:28px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;margin-bottom:4px}
.sc-sub{font-size:11px;color:var(--t3)}
.sc-chart{margin-top:10px}

/* REASONING PANEL */
.reason-flow{padding:14px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.rf-step{
  background:var(--s1);border:1px solid var(--border);border-radius:10px;
  padding:14px;position:relative;
}
.rf-step::before{
  content:'';position:absolute;left:24px;bottom:-10px;
  width:1px;height:10px;background:var(--border);
}
.rf-step:last-child::before{display:none}
.rf-num{
  width:22px;height:22px;border-radius:50%;background:var(--cyan);
  color:var(--bg);font-size:10px;font-weight:800;
  display:inline-flex;align-items:center;justify-content:center;
  margin-bottom:8px;
}
.rf-title{font-size:12px;font-weight:700;color:var(--t1);margin-bottom:4px}
.rf-body{font-size:12px;color:var(--t2);line-height:1.65}
.rf-evidence{
  margin-top:8px;padding:8px 10px;border-radius:6px;
  background:rgba(0,119,204,.05);border-left:2px solid var(--cyan);
  font-size:11px;color:var(--cyan);font-family:var(--mono);
}
.rf-agent-tag{
  display:inline-flex;align-items:center;gap:4px;
  font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;
  margin-bottom:6px;
}

/* GENERATE PANEL */
.gen-tools{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px;overflow-y:auto;flex:1}
.gen-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;
}
.gen-card:hover{border-color:var(--cyan);background:rgba(0,119,204,.04)}
.gen-card.generating{border-color:var(--amber);animation:genPulse 1s infinite}
@keyframes genPulse{0%,100%{border-color:rgba(255,184,0,.4)}50%{border-color:var(--amber)}}
.gc-icon{font-size:24px;margin-bottom:8px}
.gc-title{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:4px}
.gc-desc{font-size:11px;color:var(--t2);line-height:1.5;margin-bottom:10px}
.gc-output{
  font-size:11px;font-family:var(--mono);color:var(--cyan);
  background:rgba(0,119,204,.06);border-radius:5px;padding:8px;
  line-height:1.6;min-height:40px;
  display:none;
}
.gen-card.done .gc-output{display:block}
.gc-btn{
  width:100%;background:var(--s3);border:1px solid var(--border);
  color:var(--t2);font-size:11px;font-weight:700;
  padding:7px;border-radius:6px;cursor:pointer;transition:all .15s;
  font-family:var(--sans);margin-top:8px;
}
.gc-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.gen-card.done .gc-btn{background:rgba(22,163,74,.08);border-color:rgba(22,163,74,.3);color:var(--green)}

/* ── COMMAND INPUT ── */
.command-bar{
  flex-shrink:0;
  border-top:1.5px solid var(--border);
  background:var(--s1);
  padding:12px 16px;
}
.cmd-label{font-size:10px;font-weight:700;color:var(--cyan);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.cmd-wrap{
  display:flex;align-items:flex-end;gap:8px;
  background:var(--bg);border:1.5px solid var(--b2);border-radius:10px;
  padding:10px 14px;
  transition:border-color .2s;
}
.cmd-wrap:focus-within{border-color:rgba(0,119,204,.4);box-shadow:0 0 0 3px rgba(0,119,204,.06)}
.cmd-at{color:var(--cyan);font-size:13px;font-weight:700;flex-shrink:0;margin-bottom:2px}
.cmd-input{
  flex:1;background:transparent;border:none;outline:none;
  font-family:var(--mono);font-size:13px;color:var(--t1);
  resize:none;min-height:20px;max-height:80px;line-height:1.5;
  caret-color:var(--cyan);
}
.cmd-input::placeholder{color:var(--t3)}
.cmd-actions{display:flex;gap:6px;flex-shrink:0}
.cmd-agent-select{
  background:var(--s2);border:1px solid var(--border);
  color:var(--t2);font-size:11px;font-weight:700;
  padding:5px 10px;border-radius:6px;cursor:pointer;
  font-family:var(--sans);outline:none;
}
.cmd-send{
  background:var(--cyan);border:none;color:var(--bg);
  font-size:12px;font-weight:800;padding:7px 16px;border-radius:7px;
  cursor:pointer;transition:all .2s;font-family:var(--sans);
  display:flex;align-items:center;gap:5px;
}
.cmd-send:hover{background:#00B8E0;transform:translateY(-1px)}
.cmd-suggestions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.cmd-sug{
  font-size:10px;font-weight:600;padding:3px 10px;border-radius:12px;
  background:var(--s2);border:1px solid var(--border);color:var(--t3);
  cursor:pointer;transition:all .15s;
}
.cmd-sug:hover{border-color:var(--cyan);color:var(--cyan)}

/* ── RIGHT: RAW STREAM ── */
.stream-panel{
  background:var(--s1);border-left:1.5px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.stream-head{
  padding:12px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.sh-title{font-size:11px;font-weight:700;color:var(--t1)}
.sh-live{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:700;color:var(--green)}
.stream-filters{display:flex;gap:4px;padding:8px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.sf-btn{
  font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;cursor:pointer;
  border:1px solid var(--border);background:transparent;color:var(--t3);
  transition:all .15s;font-family:var(--sans);
}
.sf-btn.active{background:var(--s3);color:var(--t2);border-color:var(--b2)}
.sf-btn.neg-f.active{background:rgba(220,38,38,.08);color:var(--red);border-color:rgba(220,38,38,.25)}
.sf-btn.pos-f.active{background:rgba(22,163,74,.08);color:var(--green);border-color:rgba(22,163,74,.2)}

.stream-body{flex:1;overflow-y:auto;font-family:var(--mono);font-size:11px}
.stream-body::-webkit-scrollbar{width:3px}
.stream-body::-webkit-scrollbar-thumb{background:var(--s4)}

.stream-item{
  padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.03);
  display:flex;flex-direction:column;gap:3px;cursor:pointer;transition:background .1s;
}
.stream-item:hover{background:var(--s2)}
.si-meta{display:flex;align-items:center;gap:7px}
.si-ch{font-size:9px;color:var(--t3);flex-shrink:0}
.si-time{font-size:9px;color:var(--t3);margin-left:auto;flex-shrink:0}
.si-score{font-size:10px;font-weight:800;flex-shrink:0}
.si-text{font-size:11px;color:var(--t2);line-height:1.45;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.si-tags{display:flex;gap:3px;flex-wrap:wrap}
.si-tag{font-size:8px;padding:1px 5px;border-radius:3px;background:var(--s3);color:var(--t3)}

.new-badge{
  display:inline-block;width:5px;height:5px;border-radius:50%;
  background:var(--cyan);flex-shrink:0;margin-top:3px;
}
@keyframes slideIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
.stream-item.new{animation:slideIn .3s ease}

/* ── CMD RESPONSE ── */
.cmd-history{
  max-height:120px;overflow-y:auto;margin-bottom:8px;
  display:flex;flex-direction:column;gap:6px;
}
.cmd-response{
  background:rgba(0,119,204,.05);border:1px solid rgba(0,119,204,.15);
  border-radius:7px;padding:8px 12px;font-size:11px;color:var(--t2);line-height:1.6;
}
.cmd-response .cr-q{color:var(--cyan);font-weight:700;margin-bottom:3px;font-size:11px}
.cmd-response .cr-a{color:var(--t1)}

/* ── MISC ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ws-panel.active{animation:fadeIn .2s ease}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="logo-mark">LR</div>
  <div class="logo-text">Live<em>Re</em>.ai</div>
  <div class="topbar-sub">Agent Hub · 관리자 모드</div>

  <div class="agent-summary" style="margin-left:16px">
    <div class="ag-pill running">● RUNNING 3</div>
    <div class="ag-pill busy">⟳ BUSY 1</div>
    <div class="ag-pill idle">○ IDLE 1</div>
  </div>

  <div class="tb-right">
    <div class="sys-status"><div class="sys-dot"></div>시스템 정상</div>
    <button class="topbar-btn">서울관광재단 ▾</button>
    <button class="topbar-btn danger">🚨 위기 2건</button>
    <button class="topbar-btn" onclick="window.open('visitseoul_v3.html')">↗ 관제 대시보드</button>
  </div>
</header>

<!-- MAIN -->
<div class="main">

  <!-- LEFT: AGENTS -->
  <aside class="agent-panel">
    <div class="panel-header">에이전트 현황</div>
    <div class="agent-list" id="agentList"></div>

    <div class="collab-panel">
      <div class="collab-title">에이전트 협업 흐름</div>
      <div class="collab-flow" id="collabFlow"></div>
    </div>
  </aside>

  <!-- CENTER: WORKSPACE -->
  <section class="workspace">

    <!-- TABS -->
    <div class="ws-tabs">
      <div class="ws-tab active" onclick="switchTab('raw',this)">📥 로우데이터</div>
      <div class="ws-tab" onclick="switchTab('stats',this)">📊 통계·분석</div>
      <div class="ws-tab" onclick="switchTab('reason',this)">🧠 추론·인과</div>
      <div class="ws-tab" onclick="switchTab('gen',this)">✍️ 생성 도구</div>
    </div>

    <div class="ws-content">

      <!-- RAW DATA -->
      <div class="ws-panel active" id="panel-raw">
        <div class="raw-grid" id="rawGrid"></div>
      </div>

      <!-- STATS -->
      <div class="ws-panel" id="panel-stats">
        <div class="stats-grid" id="statsGrid"></div>
      </div>

      <!-- REASON -->
      <div class="ws-panel" id="panel-reason">
        <div class="reason-flow" id="reasonFlow"></div>
      </div>

      <!-- GEN TOOLS -->
      <div class="ws-panel" id="panel-gen">
        <div class="gen-tools" id="genTools"></div>
      </div>

    </div>

    <!-- COMMAND BAR -->
    <div class="command-bar">
      <div class="cmd-history" id="cmdHistory"></div>
      <div class="cmd-label">⚡ AGENT COMMAND</div>
      <div class="cmd-wrap">
        <div class="cmd-at">›</div>
        <textarea class="cmd-input" id="cmdInput"
          placeholder="에이전트에게 지시하세요… (예: 이재명 여론 향후 48시간 예측해줘, 부정 댓글 대응 문구 5개 생성해줘)"
          rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendCommand()}"
          oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
        ></textarea>
        <div class="cmd-actions">
          <select class="cmd-agent-select" id="agentSelect">
            <option value="all">모든 에이전트</option>
            <option value="collector">🔍 Collector</option>
            <option value="analyst">📊 Analyst</option>
            <option value="reasoner">🧠 Reasoner</option>
            <option value="writer">✍️ Writer</option>
            <option value="strategist">🎯 Strategist</option>
          </select>
          <button class="cmd-send" onclick="sendCommand()">
            전송 ↵
          </button>
        </div>
      </div>
      <div class="cmd-suggestions" id="cmdSugs"></div>
    </div>
  </section>

  <!-- RIGHT: STREAM -->
  <aside class="stream-panel">
    <div class="stream-head">
      <div class="sh-title">실시간 댓글 스트림</div>

  '문구':   {agent:'Writer',   text:'① "소중한 의견 감사합니다. 실제 서울 3박4일 평균 비용은 ¥만엔 이하로 도쿄와 동일 수준입니다 →"\n② "내국인 여러분을 위한 서울 시민 할인 패스가 운영 중입니다. 자세히 →"\n③ "귀한 피드백을 기반으로 서비스를 지속 개선하겠습니다."'},
  '리포트': {agent:'Writer',   text:'[위기 요약 리포트 생성 완료]\n발생: 2026-03-23 18:42 · 주요채널: IG KR, Weibo · 핵심이슈: 물가/내국인 역차별 · 권고: 댓댓글 즉시 대응 + 팩트 콘텐츠 배포. 전체 PDF → 리포트 탭에서 확인.'},
  '원인':   {agent:'Reasoner', text:'Instagram KR 부정 원인 분석 완료:\n1순위(43%): 연합뉴스 기사 확산 (18:14)\n2순위(31%): 내국인 역차별 프레임\n3순위(26%): 관광 인프라 불만\n→ 기사 대응이 가장 시급합니다.'},
  '아이디어':{agent:'Writer',  text:'① 한강 야경 ASMR 릴스 (20대 외국인 타깃)\n② "서울vs도쿄 실비용 계산기" 인터랙티브 카드\n③ 외국인 여행자 UGC 리그램 주 2회\n④ K-팝 성지 지도 핀 콘텐츠\n⑤ "서울 시민 할인 패스" 내국인 타깃 캠페인'},
};

function sendCommand(){
  const input = document.getElementById('cmdInput');
  const q = input.value.trim();
  if(!q) return;

  const key = Object.keys(CMD_RESPONSES).find(k=>q.includes(k)) || null;
  const res = key ? CMD_RESPONSES[key] : {agent:'Analyst', text:`"${q}"에 대한 분석을 시작합니다. 관련 에이전트가 데이터를 수집하고 있습니다. 약 30초 후 결과를 확인하세요.`};

  const hist = document.getElementById('cmdHistory');
  const div = document.createElement('div');
  div.className='cmd-response';
  div.innerHTML=`<div class="cr-q">› ${q} <span style="font-size:9px;color:var(--t3);font-weight:400;margin-left:8px">→ ${res.agent}</span></div><div class="cr-a">${res.text.replace(/\n/g,'<br>')}</div>`;
  hist.appendChild(div);
  hist.scrollTop = hist.scrollHeight;

  input.value='';
  input.style.height='auto';
}
</script>
</body>
</html>
