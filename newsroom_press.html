<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveRe Press</title>

<style>
:root{--bg:#fff;--bg2:#f7f7fa;--bg3:#eff0f4;--ink:#111;--ink2:#444;--ink3:#777;--ink4:#aaa;--ink5:#ccc;--border:#e6e6ee;--primary:#2952cc;--psoft:#edf0ff;--green:#0b8a5e;--gsoft:#eefbf5;--gborder:#b0e8d0;--red:#d63031;--rsoft:#fef2f2;--orange:#e67e22;--osoft:#fef9ec;--purple:#6c3aed;--ppsoft:#f4f0ff;--radius:10px;--tr:.15s ease}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg2);color:var(--ink);font-size:14px;line-height:1.6}

/* TOP */
.top{display:flex;align-items:center;padding:0 32px;height:60px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.logo{font-size:19px;font-weight:700;color:var(--ink);letter-spacing:-.3px}
.logo em{font-family:'Instrument Serif',serif;font-style:italic;color:var(--primary);font-weight:400}
.top-div{width:1px;height:24px;background:var(--border);margin:0 16px}
.top-org{font-size:12px;color:var(--ink3)}
.top-org b{color:var(--ink2);font-weight:600}
.top-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.btn{padding:8px 20px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:var(--tr);border:none}
.btn-p{background:var(--primary);color:#fff}.btn-p:hover{background:#1f3faa}
.btn-o{background:var(--bg);color:var(--ink3);border:1px solid var(--border)}.btn-o:hover{border-color:var(--primary);color:var(--primary)}
.btn-s{padding:5px 14px;font-size:11px}
.av{width:34px;height:34px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;cursor:pointer}

/* NAV */
.nav-bar{display:flex;align-items:center;gap:0;padding:0 32px;background:var(--bg);border-bottom:1px solid var(--border)}
.nav-tab{padding:14px 24px;font-size:13px;font-weight:500;color:var(--ink3);cursor:pointer;transition:var(--tr);border-bottom:2px solid transparent;position:relative}
.nav-tab:hover{color:var(--ink)}
.nav-tab.active{color:var(--primary);font-weight:700;border-bottom-color:var(--primary)}
.nav-tab .badge{position:absolute;top:8px;right:8px;background:var(--primary);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px}

/* MAIN */
.main{max-width:1200px;margin:0 auto;padding:28px 32px}
.page{display:none}.page.active{display:block}
.ph{margin-bottom:24px}
.ph h1{font-family:'Instrument Serif',serif;font-size:28px;font-weight:400;color:var(--ink);letter-spacing:-.5px}
.ph .sub{font-size:13px;color:var(--ink4);margin-top:2px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.st{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.st .sl{font-size:11px;color:var(--ink4)}
.st .sv{font-family:'JetBrains Mono';font-size:30px;font-weight:600;color:var(--ink);margin-top:2px;line-height:1}
.st .ss{font-size:11px;color:var(--ink4);margin-top:6px}
.st .sc{font-size:11px;font-weight:600;margin-top:4px}
.up{color:var(--green)}.dn{color:var(--red)}

/* CARD */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;transition:var(--tr)}
.card:hover{box-shadow:0 4px 20px rgba(0,0,0,.04)}
.ct{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.mono{font-family:'JetBrains Mono',monospace}
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:5px;font-size:10px;font-weight:600}
.t-green{background:var(--gsoft);color:var(--green)}.t-red{background:var(--rsoft);color:var(--red)}
.t-blue{background:var(--psoft);color:var(--primary)}.t-orange{background:var(--osoft);color:var(--orange)}
.t-purple{background:var(--ppsoft);color:var(--purple)}.t-gray{background:var(--bg3);color:var(--ink4)}

/* ─── PR LIST ─── */
.pr{display:flex;align-items:stretch;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;cursor:pointer;transition:var(--tr);overflow:hidden}
.pr:hover{border-color:var(--primary);box-shadow:0 2px 16px rgba(41,82,204,.05)}
.pr-color{width:4px;flex-shrink:0}
.pr-body{flex:1;padding:18px 22px;display:flex;align-items:center;gap:18px}
.pr-info{flex:1}
.pr-title{font-size:14px;font-weight:600;color:var(--ink);line-height:1.4}
.pr-meta{font-size:11px;color:var(--ink4);margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pr-nums{display:flex;gap:20px;flex-shrink:0}
.pr-num{text-align:center}
.pr-num .v{font-family:'JetBrains Mono';font-size:18px;font-weight:600;color:var(--ink);line-height:1}
.pr-num .l{font-size:9px;color:var(--ink4);text-transform:uppercase;margin-top:3px;letter-spacing:.3px}

/* ─── DISTRIBUTION DETAIL ─── */
.dist-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)}
.dist-row:last-child{border:none}
.d-icon{width:40px;height:40px;border-radius:10px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.d-info{flex:1}
.d-name{font-size:13px;font-weight:600;color:var(--ink)}
.d-sub{font-size:11px;color:var(--ink4);margin-top:1px}
.d-nums{display:flex;gap:24px}
.d-num{text-align:right}
.d-num .dv{font-family:'JetBrains Mono';font-size:15px;font-weight:600;color:var(--ink)}
.d-num .dl{font-size:9px;color:var(--ink4);text-transform:uppercase}

/* ─── RESULT BARS ─── */
.res-bar-wrap{margin-bottom:16px}
.res-bar-label{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px}
.res-bar-label .rbl{color:var(--ink2);font-weight:500}
.res-bar-label .rbv{font-family:'JetBrains Mono';font-weight:600;color:var(--ink)}
.res-bar{height:10px;background:var(--bg3);border-radius:5px;overflow:hidden}
.res-bar-fill{height:100%;border-radius:5px;transition:width 1s ease}

/* SENTIMENT */
.sent-bar{display:flex;height:12px;border-radius:6px;overflow:hidden;gap:2px}
.sb-p{background:var(--green)}.sb-n{background:var(--ink5)}.sb-ng{background:var(--red)}

/* ─── TIMELINE ─── */
.tl-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--border)}
.tl-item:last-child{border:none}
.tl-time{font-family:'JetBrains Mono';font-size:11px;color:var(--ink4);width:50px;flex-shrink:0;padding-top:2px}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px}
.tl-content{flex:1;font-size:12px;color:var(--ink2);line-height:1.5}

/* FOOTER NOTE */
.fn{text-align:center;padding:40px 0 20px;font-size:11px;color:var(--ink5)}

.fade{animation:fi .4s ease forwards;opacity:0}
@keyframes fi{to{opacity:1}}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--ink5);border-radius:3px}
</style>
</head>

const tabs=document.querySelectorAll('.nav-tab');
const pages=[document.getElementById('p0'),document.getElementById('p1'),document.getElementById('p2')];
function go(i){tabs.forEach(t=>t.classList.remove('active'));tabs[i].classList.add('active');pages.forEach(p=>p.classList.remove('active'));pages[i].classList.add('active');
  if(i===1)initDist();if(i===2)initResult();}

// ═══ TAB 1: 보도자료 목록 ═══
function renderPRList(){
  document.getElementById('prList').innerHTML=prs.map(p=>{
    const statusLabel=p.status==='published'?'발행 완료':p.status==='reviewing'?'검수 중':'작성 중';
    const statusTag=p.status==='published'?'t-green':p.status==='reviewing'?'t-orange':'t-gray';
    const hasData=p.status==='published';
    return`<div class="pr" onclick="go(1);document.getElementById('distSelect').value=${p.id};renderDist()">
      <div class="pr-color" style="background:${p.color}"></div>
      <div class="pr-body">
        <div class="pr-info">
          <div class="pr-title">${p.title}</div>
          <div class="pr-meta">
            <span class="tag ${statusTag}">${statusLabel}</span>
            <span>${p.cat}</span>
            <span>${p.date}</span>
            ${hasData?`<span>→ <b>${p.dist.articles}개 매체</b> 기사화</span>`:''}
          </div>
        </div>
        ${hasData?`<div class="pr-nums">
          <div class="pr-num"><div class="v">${p.dist.reach}</div><div class="l">도달</div></div>
          <div class="pr-num"><div class="v">${p.dist.clicks}</div><div class="l">클릭</div></div>
          <div class="pr-num"><div class="v">${p.dist.total}</div><div class="l">매체</div></div>
        </div>`:''}
      </div>
    </div>`;
  }).join('');
}
renderPRList();

// ═══ TAB 2: 배포 현황 ═══
function initDist(){
  const sel=document.getElementById('distSelect');
  sel.innerHTML=prs.filter(p=>p.status==='published').map(p=>`<option value="${p.id}">${p.title} (${p.date})</option>`).join('');
  renderDist();
}

function renderDist(){
  const id=parseInt(document.getElementById('distSelect').value)||0;
  const p=prs[id];
  if(!p||!p.channels.length){document.getElementById('distStats').innerHTML='<div class="st" style="grid-column:1/-1;text-align:center;color:var(--ink4)">아직 배포 전입니다.</div>';document.getElementById('distList').innerHTML='';return;}

  document.getElementById('distStats').innerHTML=`
    <div class="st"><div class="sl">배포 매체</div><div class="sv">${p.dist.total}</div><div class="ss">동시 배포</div></div>
    <div class="st"><div class="sl">총 도달</div><div class="sv" style="color:var(--primary)">${p.dist.reach}</div><div class="ss">조회 + 노출</div></div>
    <div class="st"><div class="sl">총 클릭</div><div class="sv" style="color:var(--green)">${p.dist.clicks}</div><div class="ss">전 채널 합산</div></div>
    <div class="st"><div class="sl">기사화 매체</div><div class="sv">${p.dist.articles}</div><div class="ss">실제 기사 게재</div></div>
  `;

  const grouped={};
  p.channels.forEach(c=>{if(!grouped[c.type])grouped[c.type]=[];grouped[c.type].push(c);});

  let html='';
  for(const [type,chs] of Object.entries(grouped)){
    html+=`<div style="font-size:11px;font-weight:700;color:var(--ink4);text-transform:uppercase;letter-spacing:1px;padding:14px 0 6px;border-bottom:1px solid var(--border)">${type}</div>`;
    chs.forEach(c=>{
      html+=`<div class="dist-row">
        <div class="d-icon">${c.icon}</div>
        <div class="d-info"><div class="d-name">${c.name}</div><div class="d-sub">${c.status}</div></div>
        <div class="d-nums">
          <div class="d-num"><div class="dv">${c.views}</div><div class="dl">조회</div></div>
          <div class="d-num"><div class="dv">${c.clicks}</div><div class="dl">클릭</div></div>
          <div class="d-num"><div class="dv">${c.comments||'—'}</div><div class="dl">댓글</div></div>
          <div class="d-num"><div class="dv">${c.shares?c.shares.toLocaleString():'—'}</div><div class="dl">공유</div></div>
        </div>
      </div>`;
    });
  }
  document.getElementById('distList').innerHTML=`<div class="ct">📡 매체별 배포 상세</div>${html}`;
}

// ═══ TAB 3: 성과 분석 ═══
function initResult(){
  const sel=document.getElementById('resultSelect');
  sel.innerHTML=prs.filter(p=>p.status==='published').map(p=>`<option value="${p.id}">${p.title} (${p.date})</option>`).join('');
  renderResult();
}

function renderResult(){
  const id=parseInt(document.getElementById('resultSelect').value)||0;
  const p=prs[id];
  if(!p||!p.result){return;}
  const r=p.result;

  document.getElementById('resStats').innerHTML=`
    <div class="st"><div class="sl">총 조회수</div><div class="sv">${r.views}</div><div class="ss">순방문 ${r.uniq}</div></div>
    <div class="st"><div class="sl">평균 체류</div><div class="sv" style="color:var(--primary)">${r.readTime}</div><div class="ss">이탈률 ${r.bounce}</div></div>
    <div class="st"><div class="sl">댓글</div><div class="sv" style="color:var(--orange)">${r.comments}</div><div class="ss">전 채널 합산</div></div>
    <div class="st"><div class="sl">공유</div><div class="sv" style="color:var(--green)">${r.shares.toLocaleString()}</div><div class="ss">SNS + 메신저</div></div>
  `;

  // Channel performance bars
  const topChannels=p.channels.slice(0,5);
  const maxViews=Math.max(...topChannels.map(c=>parseInt(c.views?.replace(/,/g,'')||'0')));
  document.getElementById('resChart').innerHTML=`<div class="ct">📊 채널별 조회수</div>${topChannels.map(c=>{
    const val=parseInt(c.views?.replace(/,/g,'')||'0');
    const pct=maxViews?Math.round(val/maxViews*100):0;
    const barColor=c.type==='포털'?'var(--green)':c.type==='종합지'?'var(--primary)':'var(--purple)';
    return`<div class="res-bar-wrap"><div class="res-bar-label"><span class="rbl">${c.icon} ${c.name}</span><span class="rbv">${c.views}</span></div><div class="res-bar"><div class="res-bar-fill" style="width:${pct}%;background:${barColor}"></div></div></div>`;
  }).join('')}`;

  // Sentiment
  document.getElementById('resSentiment').innerHTML=`<div class="ct">💬 여론 분석</div>
    <div style="display:flex;gap:12px;margin-bottom:16px">
      <div style="flex:1;text-align:center;padding:16px;background:var(--gsoft);border-radius:8px"><div style="font-size:28px;font-weight:700;color:var(--green)">${r.sentiment.pos}%</div><div style="font-size:11px;color:var(--green);margin-top:2px">긍정</div></div>
      <div style="flex:1;text-align:center;padding:16px;background:var(--bg3);border-radius:8px"><div style="font-size:28px;font-weight:700;color:var(--ink3)">${r.sentiment.neu}%</div><div style="font-size:11px;color:var(--ink3);margin-top:2px">중립</div></div>
      <div style="flex:1;text-align:center;padding:16px;background:var(--rsoft);border-radius:8px"><div style="font-size:28px;font-weight:700;color:var(--red)">${r.sentiment.neg}%</div><div style="font-size:11px;color:var(--red);margin-top:2px">부정</div></div>
    </div>
    <div class="sent-bar"><div class="sb-p" style="width:${r.sentiment.pos}%"></div><div class="sb-n" style="width:${r.sentiment.neu}%"></div><div class="sb-ng" style="width:${r.sentiment.neg}%"></div></div>
    <div style="margin-top:14px;padding:12px;background:var(--bg2);border-radius:8px">
      <div style="font-size:10px;color:var(--ink4);margin-bottom:4px">💬 대표 댓글</div>
      <div style="font-size:13px;color:var(--ink2);line-height:1.5">"${r.topComment}"</div>
    </div>`;

  // Timeline
  document.getElementById('resTimeline').innerHTML=`<div class="ct">⏱️ 배포 타임라인</div>${r.timeline.map(t=>`<div class="tl-item"><div class="tl-time">${t.time}</div><div class="tl-dot" style="background:${t.dot}"></div><div class="tl-content">${t.text}</div></div>`).join('')}`;

  // AI Insight
  document.getElementById('resInsight').innerHTML=`<div class="ct">✦ AI 인사이트</div>
    <div style="padding:16px;background:var(--ppsoft);border:1px solid #e0d5ff;border-radius:8px;font-size:13px;color:var(--ink2);line-height:1.7">${r.insight}</div>
    <div style="margin-top:14px;display:flex;gap:8px">
      <button class="btn btn-p btn-s">📋 PDF 리포트 다운로드</button>
      <button class="btn btn-o btn-s">📧 이메일로 리포트 전송</button>
    </div>`;
}
</script>
</body>
</html>
